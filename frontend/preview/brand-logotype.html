<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; font-family: 'Barlow Condensed', sans-serif; padding: 32px 24px; display: flex; flex-direction: column; gap: 28px; }

.logotype {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #fff;
  line-height: 1;
}
.logotype .accent { color: #e8002d; }
.logotype-sub {
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #555;
  margin-top: 4px;
}

.logotype-lg {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 52px;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  color: #fff;
  line-height: 0.95;
}
.logotype-lg .accent { color: #e8002d; }

.divider { border: none; border-top: 1px solid #1c1c1c; }

.rule-label {
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #555;
  margin-bottom: 8px;
}
</style>
</head>
<body>
  <div>
    <div class="rule-label">Logotype — Header size</div>
    <div class="logotype">The Consistency <span class="accent">Theorem</span></div>
    <div class="logotype-sub">A data journalism investigation · 2025 F1 Season</div>
  </div>
  <hr class="divider">
  <div>
    <div class="rule-label">Logotype — Display / Hero size</div>
    <div class="logotype-lg">The Consistency<br><span class="accent">Theorem</span></div>
  </div>
</body>
</html>
