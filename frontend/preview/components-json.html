<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; font-family: 'Barlow', sans-serif; padding: 24px; }
.json-block {
  border: 1px solid #222;
  border-radius: 4px;
  overflow: hidden;
}
.json-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: #161616;
  cursor: pointer;
  user-select: none;
}
.json-header-left { display: flex; align-items: center; gap: 8px; }
.json-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; }
.json-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; background: #222; color: #555; padding: 2px 6px; border-radius: 2px; }
.json-chevron { font-size: 10px; color: #555; transition: transform 200ms ease; }
.json-chevron.open { transform: rotate(180deg); }
.json-body {
  background: #0d0d0d;
  padding: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #888;
  line-height: 1.7;
  border-top: 1px solid #1c1c1c;
  max-height: 120px;
  overflow: auto;
}
.json-key { color: #e8002d; }
.json-str { color: #c0c0c0; }
.json-num { color: #fff; }
</style>
</head>
<body>
  <div class="json-block">
    <div class="json-header" onclick="toggle()">
      <div class="json-header-left">
        <span class="json-title">Raw Pipeline Output</span>
        <span class="json-badge">JSON</span>
      </div>
      <span class="json-chevron open" id="chevron">▼</span>
    </div>
    <div class="json-body" id="body">
{<br>
&nbsp;&nbsp;<span class="json-key">"driver"</span>: <span class="json-str">"Oscar Norris"</span>,<br>
&nbsp;&nbsp;<span class="json-key">"season"</span>: <span class="json-num">2025</span>,<br>
&nbsp;&nbsp;<span class="json-key">"stddev_positions"</span>: <span class="json-num">0.89</span>,<br>
&nbsp;&nbsp;<span class="json-key">"champion_stddev"</span>: <span class="json-num">0.31</span>,<br>
&nbsp;&nbsp;<span class="json-key">"points_rate_before_lead"</span>: <span class="json-num">16.2</span>,<br>
&nbsp;&nbsp;<span class="json-key">"points_rate_after_lead"</span>: <span class="json-num">11.4</span>,<br>
&nbsp;&nbsp;<span class="json-key">"rounds_led"</span>: <span class="json-num">14</span><br>
}
    </div>
  </div>
  <script>
    function toggle() {
      const body = document.getElementById('body');
      const ch = document.getElementById('chevron');
      if (body.style.display === 'none') {
        body.style.display = 'block';
        ch.classList.add('open');
      } else {
        body.style.display = 'none';
        ch.classList.remove('open');
      }
    }
  </script>
</body>
</html>
