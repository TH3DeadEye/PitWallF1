<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes stepIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body { background: #0f0f0f; color: #fff; font-family: 'Barlow', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f0f0f; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

  #loading-overlay {
    position: fixed; inset: 0; background: #0f0f0f; z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px;
  }
  #loading-overlay.hidden { display: none; }
  .loading-logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; opacity: 0.35; }
  .loading-logo .r { color: #e8002d; opacity: 1; }
  .loading-context { font-family: 'Barlow', sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #444; margin-top: -28px; }
  .loading-steps { display: flex; flex-direction: column; gap: 12px; min-width: 300px; }
  .loading-step { display: flex; align-items: center; gap: 12px; opacity: 0; animation: stepIn 300ms ease forwards; }
  .loading-step.done { opacity: 0.4; }
  .loading-step.active { opacity: 1; }
  .step-indicator { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-spinner { width: 14px; height: 14px; border: 2px solid rgba(232,0,45,0.2); border-top-color: #e8002d; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .step-check { font-size: 11px; color: #555; }
  .step-pending { width: 12px; height: 12px; border: 1px solid #2a2a2a; border-radius: 50%; }
  .step-text { font-size: 13px; color: #888; letter-spacing: 0.02em; }
  .loading-step.done .step-text { color: #3a3a3a; text-decoration: line-through; text-decoration-color: #2a2a2a; }
  .loading-step.active .step-text { color: #fff; }
</style>
</head>
<body>

<div id="loading-overlay" class="hidden">

</div>

  "defaultSeason": 2025

/* ─────────────────────────────────────────────
   SEASON SELECTOR
───────────────────────────────────────────── */
function SeasonSelector({ selected, onSelect }) {
  const years = [2021, 2022, 2023, 2024, 2025];
  return (
    <div style={ss.wrap}>
      <div style={ss.inner}>
        <div style={ss.label}>Select season</div>
        <div style={ss.row}>
          {years.map(yr => {
            const d = SEASONS[yr];
            const isActive = selected === yr;
            return (
              <button
                key={yr}
                onClick={() => onSelect(yr)}
                style={{
                  ...ss.card,
                  ...(isActive ? ss.cardActive : {}),
                }}
              >
                <div style={{ ...ss.year, ...(isActive ? ss.yearActive : {}) }}>{yr}</div>
                <div style={ss.champ}>
                  <span style={ss.champName}>{d.champion}</span>
                  <span style={ss.dot}>·</span>
                  <span style={ss.team}>{d.constructor}</span>
                </div>
                <div style={ss.teaser}>{d.theme}</div>
                {isActive && <div style={ss.activeLine}></div>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const ss = {

/* ─────────────────────────────────────────────
   QUESTION INPUT
───────────────────────────────────────────── */
function QuestionInput({ season, question, onChange, onRun, isLoading }) {
  const presets = SEASONS[season].presetQuestions;

  return (
    <div style={qi.wrap}>
      <div style={qi.inner}>
        <div style={qi.label}>Ask a question about {season}</div>
        <div style={qi.row}>
          <div style={qi.inputWrap}>
            <input
              style={qi.input}
              type="text"
              value={question}
              onChange={e => onChange(e.target.value)}
              placeholder="e.g. Why did the runner-up lose despite leading?"
              onKeyDown={e => e.key === 'Enter' && !isLoading && onRun()}
            />
          </div>
          <button
            style={{ ...qi.btn, ...(isLoading ? qi.btnLoading : {}) }}
            onClick={onRun}
            disabled={isLoading}
          >
            {isLoading
              ? <><span style={qi.spinner}></span>Running…</>
              : 'Run Pipeline'
            }
          </button>
        </div>
        <div style={qi.presets}>
          {presets.map((p, i) => (
            <button
              key={i}
              style={{
                ...qi.chip,
                ...(question === p ? qi.chipActive : {}),
              }}
              onClick={() => onChange(p)}
            >{p}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function AppHeader() {

      <div style={hdr.inner}>
        <div>
          <div style={hdr.logo}>THE CONSISTENCY <span style={hdr.accent}>THEOREM</span></div>

/* ─────────────────────────────────────────────
   HERO
───────────────────────────────────────────── */
function Hero({ season, visible }) {
  const d = SEASONS[season];
  return (
    <section style={{ ...hero.wrap, opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(16px)', transition: 'opacity 500ms ease, transform 500ms ease' }}>
      <div style={hero.inner}>
        <div style={hero.eyebrow}><span style={hero.rule}></span><span style={hero.eyebrowText}>The finding · {season}</span></div>
        <p style={hero.lede}>
          {d.hook.split(d.angle.split(' ')[0]).map((part, i, arr) =>
            i < arr.length - 1
              ? <React.Fragment key={i}>{part}<span style={hero.highlight}>{d.angle.split(' ')[0]}</span></React.Fragment>
              : part
          )}
        </p>
        <p style={hero.sub}>{d.angle} — three computed metrics, one AI-generated story.</p>
      </div>
    </section>
  );
}
const hero = {
  wrap: { padding: '72px 40px 64px', borderBottom: '1px solid #1c1c1c' },
  inner: { maxWidth: '1200px', margin: '0 auto' },
  eyebrow: { display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px' },
  rule: { display: 'block', width: '24px', height: '2px', background: '#e8002d' },
  eyebrowText: { fontFamily: "'Barlow', sans-serif", fontSize: '11px', fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#888' },
  lede: { fontFamily: "'Libre Baskerville', serif", fontSize: 'clamp(24px, 3.5vw, 46px)', fontWeight: 700, lineHeight: 1.1, letterSpacing: '-0.02em', color: '#fff', maxWidth: '860px', textWrap: 'pretty', marginBottom: '20px' },
  highlight: { color: '#e8002d' },
  sub: { fontFamily: "'Libre Baskerville', serif", fontSize: '17px', color: '#666', lineHeight: 1.5, fontStyle: 'italic' },
};

/* ─────────────────────────────────────────────
   CHARTS
───────────────────────────────────────────── */
function Charts({ season, visible }) {
  const c1ref = React.useRef(null);
  const c2ref = React.useRef(null);
  const c1inst = React.useRef(null);
  const c2inst = React.useRef(null);
  const prevSeason = React.useRef(null);

  React.useEffect(() => {
    if (!visible) return;
    const d = SEASONS[season];
    const timer = setTimeout(() => {
      const chartOpts = (yLabel) => ({
        responsive: true,
        animation: { duration: 700, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#1a1a1a', borderColor: '#2a2a2a', borderWidth: 1, titleColor: '#888', bodyColor: '#fff', titleFont: { family: 'Barlow', size: 10 }, bodyFont: { family: 'Barlow', size: 12, weight: '600' }, padding: 10 },
        },
        scales: {
          x: { grid: { color: '#161616' }, ticks: { color: '#555', font: { family: 'Barlow', size: 10 } }, border: { color: '#1c1c1c' } },
          y: { grid: { color: '#161616' }, ticks: { color: '#555', font: { family: 'Barlow', size: 10 } }, border: { color: '#1c1c1c' }, title: { display: true, text: yLabel, color: '#3a3a3a', font: { family: 'Barlow', size: 10 } } },
        },
      });

      if (c1inst.current) {
        c1inst.current.data.datasets[0].data = d.chart1.champion;
        c1inst.current.data.datasets[1].data = d.chart1.runnerUp;
        c1inst.current.update();
      } else if (c1ref.current) {
        c1inst.current = new Chart(c1ref.current, {
          type: 'bar',
          data: {
            labels: ['2021','2022','2023','2024','2025'],
            datasets: [
              { label: 'Champion', data: d.chart1.champion, backgroundColor: '#e8002d', borderRadius: 1, barPercentage: 0.45 },
              { label: 'Runner-up', data: d.chart1.runnerUp, backgroundColor: '#2a2a2a', borderRadius: 1, barPercentage: 0.45 },
            ],
          },
          options: chartOpts('Std Dev (σ)'),
        });
      }

      if (c2inst.current) {
        c2inst.current.data.datasets[0].data = d.chart2;
        c2inst.current.data.datasets[0].backgroundColor = d.chart2.map((_, i) => i >= d.leadRound ? '#2a2a2a' : '#e8002d');
        c2inst.current.update();
      } else if (c2ref.current) {
        c2inst.current = new Chart(c2ref.current, {
          type: 'bar',
          data: {
            labels: d.chart2.map((_, i) => `R${i+1}`),
            datasets: [{
              label: 'Points',
              data: d.chart2,
              backgroundColor: d.chart2.map((_, i) => i >= d.leadRound ? '#2a2a2a' : '#e8002d'),
              borderRadius: 1, barPercentage: 0.75,
            }],
          },
          options: chartOpts('Points'),
        });
      }
      prevSeason.current = season;
    }, 150);
    return () => clearTimeout(timer);
  }, [visible, season]);

  const d = SEASONS[season];
  return (
    <section style={{ ...ch.wrap, opacity: visible ? 1 : 0, transition: 'opacity 600ms ease 150ms' }}>
      <div style={ch.inner}>
        <div style={ch.grid}>
          <div style={ch.card}>
            <div style={ch.cardTitle}>Finishing position std dev · {season}</div>
            <div style={ch.cardSub}>Champion vs runner-up across seasons</div>
            <div style={ch.legend}>
              <span style={ch.legItem}><span style={{...ch.legDot,background:'#e8002d'}}></span>Champion</span>
              <span style={ch.legItem}><span style={{...ch.legDot,background:'#2a2a2a'}}></span>Runner-up</span>
            </div>
            <canvas ref={c1ref} height={190}></canvas>
          </div>
          <div style={ch.card}>
            <div style={ch.cardTitle}>Points per race · {d.runnerUp} · {season}</div>
            <div style={ch.cardSub}>Before vs after taking championship lead (R{d.leadRound})</div>
            <div style={ch.legend}>
              <span style={ch.legItem}><span style={{...ch.legDot,background:'#e8002d'}}></span>Before lead</span>
              <span style={ch.legItem}><span style={{...ch.legDot,background:'#2a2a2a'}}></span>After lead</span>
            </div>
            <canvas ref={c2ref} height={190}></canvas>
          </div>
        </div>
      </div>
    </section>
  );
}
const ch = {
  wrap: { padding: '56px 40px', borderBottom: '1px solid #1c1c1c' },
  inner: { maxWidth: '1200px', margin: '0 auto' },
  grid: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1px', background: '#1c1c1c', border: '1px solid #1c1c1c' },
  card: { background: '#0f0f0f', padding: '24px' },
  cardTitle: { fontFamily: "'Barlow', sans-serif", fontSize: '11px', fontWeight: 600, letterSpacing: '0.07em', textTransform: 'uppercase', color: '#888', marginBottom: '3px' },
  cardSub: { fontFamily: "'Barlow', sans-serif", fontSize: '10px', color: '#3a3a3a', marginBottom: '10px' },
  legend: { display: 'flex', gap: '14px', marginBottom: '14px' },
  legItem: { display: 'flex', alignItems: 'center', gap: '5px', fontFamily: "'Barlow', sans-serif", fontSize: '10px', color: '#555', textTransform: 'uppercase', letterSpacing: '0.04em' },
  legDot: { display: 'inline-block', width: '8px', height: '8px', borderRadius: '1px' },
};

/* ─────────────────────────────────────────────
   STAT CALLOUTS
───────────────────────────────────────────── */
function StatCallouts({ season, visible }) {
  const d = SEASONS[season];
  const s = d.stats;
  const stats = [
    { number: s.stddev.toFixed(2), unit: 'σ', accent: true, label: s.statLabel, sub: s.statSub },
    { number: (s.pointsRateBefore - s.pointsRateAfter).toFixed(1), unit: 'pts', accent: false, label: 'Points rate collapse', sub: 'Per-race drop after taking the lead' },
    { number: String(s.roundsLed), unit: null, accent: false, label: 'Rounds led', sub: 'Consecutive rounds without converting to title' },
  ];
  return (
    <section style={{ ...sc.wrap, opacity: visible ? 1 : 0, transition: 'opacity 600ms ease 200ms' }}>
      <div style={sc.inner}>
        <div style={sc.eyebrow}><span style={sc.rule}></span><span style={sc.eyebrowText}>Key findings · {season}</span></div>
        <div style={sc.grid}>
          {stats.map((stat, i) => (
            <div key={i} style={{ ...sc.card, ...(i > 0 ? { borderLeft: '1px solid #1c1c1c' } : {}) }}>
              <div style={{ ...sc.number, color: stat.accent ? '#e8002d' : '#fff' }}>
                {stat.number}{stat.unit && <span style={sc.unit}>{stat.unit}</span>}
              </div>
              <div style={sc.label}>{stat.label}</div>
              <div style={sc.sub}>{stat.sub}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}
const sc = {
  wrap: { padding: '64px 40px', borderBottom: '1px solid #1c1c1c', background: '#0a0a0a' },
  inner: { maxWidth: '1200px', margin: '0 auto' },
  eyebrow: { display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '28px' },
  rule: { display: 'block', width: '24px', height: '2px', background: '#e8002d' },
  eyebrowText: { fontFamily: "'Barlow', sans-serif", fontSize: '11px', fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#888' },
  grid: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', border: '1px solid #1c1c1c' },
  card: { padding: '28px 24px' },
  number: { fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: '58px', letterSpacing: '-0.02em', lineHeight: 1, marginBottom: '10px' },
  unit: { fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: '26px', color: '#888', marginLeft: '3px' },
  label: { fontFamily: "'Barlow', sans-serif", fontSize: '11px', fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#888', marginBottom: '4px' },
  sub: { fontFamily: "'Barlow', sans-serif", fontSize: '11px', color: '#3a3a3a', lineHeight: 1.4 },
};

/* ─────────────────────────────────────────────
   STORY
───────────────────────────────────────────── */
function Story({ season, question, visible }) {
  const d = SEASONS[season];
  return (
    <section style={{ ...st.wrap, opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(10px)', transition: 'opacity 500ms ease 100ms, transform 500ms ease 100ms' }}>
      <div style={st.inner}>
        <div style={st.eyebrow}><span style={st.rule}></span><span style={st.eyebrowText}>The story</span></div>
        {question && question.trim() && (
          <div style={st.questionBanner}>
            <span style={st.questionLabel}>Question:</span>
            <span style={st.questionText}>{question}</span>
          </div>
        )}
        {d.story.map((para, i) => (
          <p key={i} style={{ ...st.p, ...(i < d.story.length - 1 ? { marginBottom: '24px' } : {}) }}>{para}</p>
        ))}
      </div>

}
const st = {
  wrap: { padding: '72px 40px', borderBottom: '1px solid #1c1c1c' },
  inner: { maxWidth: '720px', margin: '0 auto' },
  eyebrow: { display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '32px' },
  rule: { display: 'block', width: '24px', height: '2px', background: '#e8002d' },
  eyebrowText: { fontFamily: "'Barlow', sans-serif", fontSize: '11px', fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#888' },
  questionBanner: { background: '#111', border: '1px solid #1c1c1c', borderLeft: '2px solid #e8002d', padding: '10px 14px', marginBottom: '28px', display: 'flex', gap: '10px', alignItems: 'baseline' },
  questionLabel: { fontFamily: "'Barlow', sans-serif", fontSize: '10px', fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#e8002d', flexShrink: 0 },
  questionText: { fontFamily: "'Barlow', sans-serif", fontSize: '13px', color: '#888', fontStyle: 'italic' },
  p: { fontFamily: "'Libre Baskerville', serif", fontSize: '17px', lineHeight: 1.75, color: '#c0c0c0', textWrap: 'pretty' },
};

/* ─────────────────────────────────────────────
   JSON VIEWER
───────────────────────────────────────────── */
function JsonViewer({ season, question, visible }) {
  const [open, setOpen] = React.useState(false);
  const d = SEASONS[season];
  const s = d.stats;
  const payload = {
    season,
    driver: d.runnerUp,
    constructor: d.constructor,
    question: question || null,
    angle: d.angle,
    stddev_positions: s.stddev,
    champion_stddev: s.championStddev,
    stddev_delta: +(s.stddev - s.championStddev).toFixed(2),
    points_rate_before_lead: s.pointsRateBefore,
    points_rate_after_lead: s.pointsRateAfter,
    points_rate_delta: +(s.pointsRateAfter - s.pointsRateBefore).toFixed(1),
    rounds_led: s.roundsLed,
    lead_round: d.leadRound,
    verdict: "Consistency collapse confirmed. Mechanical advantage insufficient.",
  };

  return (
    <section style={{ ...jv.wrap, opacity: visible ? 1 : 0, transition: 'opacity 600ms ease 300ms' }}>
      <div style={jv.inner}>
        <div style={jv.header} onClick={() => setOpen(o => !o)} role="button" tabIndex={0} onKeyDown={e => e.key==='Enter'&&setOpen(o=>!o)}>
          <div style={jv.left}>
            <span style={jv.title}>Raw Pipeline Output</span>
            <span style={jv.badge}>JSON</span>
            <span style={jv.count}>{Object.keys(payload).length} keys · {season}</span>
          </div>
          <span style={{ ...jv.chevron, transform: open ? 'rotate(180deg)' : 'none' }}>▼</span>
        </div>
        {open && (
          <div style={jv.body}>
            <pre style={jv.pre}>
              {JSON.stringify(payload, null, 2).split('\n').map((line, i) => {
                const ci = line.indexOf(':');
                if (ci > -1) {
                  return <span key={i}><span style={jv.key}>{line.slice(0,ci+1)}</span><span style={jv.val}>{line.slice(ci+1)}</span>{'\n'}</span>;
                }
                return <span key={i} style={jv.brace}>{line+'\n'}</span>;
              })}
            </pre>
          </div>
        )}
      </div>
    </section>
  );
}
const jv = {
  wrap: { padding: '40px 40px 80px' },
  inner: { maxWidth: '1200px', margin: '0 auto' },
  header: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '11px 16px', background: '#0d0d0d', border: '1px solid #1a1a1a', cursor: 'pointer', userSelect: 'none' },
  left: { display: 'flex', alignItems: 'center', gap: '10px' },
  title: { fontFamily: "'Barlow', sans-serif", fontSize: '11px', fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#888' },
  badge: { fontFamily: "'JetBrains Mono', monospace", fontSize: '10px', background: '#1a1a1a', color: '#444', padding: '2px 7px', borderRadius: '2px' },
  count: { fontFamily: "'Barlow', sans-serif", fontSize: '10px', color: '#3a3a3a' },
  chevron: { fontSize: '9px', color: '#444', display: 'inline-block', transition: 'transform 200ms ease' },
  body: { background: '#080808', border: '1px solid #1a1a1a', borderTop: 'none', padding: '20px', overflowX: 'auto' },
  pre: { fontFamily: "'JetBrains Mono', monospace", fontSize: '12px', lineHeight: 1.75, margin: 0, whiteSpace: 'pre' },
  key: { color: '#e8002d' },
  val: { color: '#c0c0c0' },
  brace: { color: '#3a3a3a' },
};

/* ─────────────────────────────────────────────
   MAIN APP
───────────────────────────────────────────── */
function App() {
  const [tweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweakPanelVisible, setTweakPanelVisible] = React.useState(false);
  const [season, setSeason] = React.useState(tweaks.defaultSeason || 2025);
  const [question, setQuestion] = React.useState('');
  const [contentVisible, setContentVisible] = React.useState(false);
  const [isLoading, setIsLoading] = React.useState(false);
  const contentRef = React.useRef(null);

  // Tweaks protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakPanelVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakPanelVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Initial content reveal
  React.useEffect(() => {
    const t = setTimeout(() => setContentVisible(true), 400);
    return () => clearTimeout(t);
  }, []);

  function handleSeasonChange(yr) {
    setSeason(yr);
    setQuestion('');
    // Fade out and back in
    setContentVisible(false);
    setTimeout(() => setContentVisible(true), 350);
  }

  function runPipeline() {
    if (isLoading) return;
    setIsLoading(true);
    setContentVisible(false);

    const overlay = document.getElementById('loading-overlay');
    const stepsEl = document.getElementById('loading-steps');
    const ctxEl = document.getElementById('loading-context');
    ctxEl.textContent = `${season} · ${question || SEASONS[season].angle}`;
    overlay.classList.remove('hidden');
    stepsEl.innerHTML = '';

    const steps = PIPELINE_STEPS.map(fn => fn(season));
    const stepEls = steps.map((text, i) => {
      const el = document.createElement('div');
      el.className = 'loading-step';
      el.style.animationDelay = `${i * 100}ms`;
      el.innerHTML = `<div class="step-indicator"><div class="step-pending"></div></div><div class="step-text">${text}</div>`;
      stepsEl.appendChild(el);
      return el;
    });

    let cur = 0;
    function next() {
      if (cur > 0) {
        stepEls[cur-1].classList.remove('active');
        stepEls[cur-1].classList.add('done');
        stepEls[cur-1].querySelector('.step-indicator').innerHTML = '<span class="step-check">✓</span>';
      }
      if (cur < stepEls.length) {
        stepEls[cur].classList.add('active');
        stepEls[cur].querySelector('.step-indicator').innerHTML = '<div class="step-spinner"></div>';
        cur++;
        setTimeout(next, 650 + Math.random() * 500);
      } else {
        setTimeout(() => {
          overlay.classList.add('hidden');
          setIsLoading(false);
          setContentVisible(true);
          // scroll to content
          if (contentRef.current) {
            contentRef.current.style.scrollMarginTop = '60px';
            window.scrollTo({ top: contentRef.current.offsetTop - 60, behavior: 'smooth' });
          }
        }, 350);
      }
    }
    setTimeout(next, 200);
  }

  return (
    <div style={{ minHeight: '100vh', background: '#0f0f0f' }}>
      <AppHeader />
      <SeasonSelector selected={season} onSelect={handleSeasonChange} />
      <QuestionInput season={season} question={question} onChange={setQuestion} onRun={runPipeline} isLoading={isLoading} />

      <div ref={contentRef}>
        <Hero season={season} visible={contentVisible} />
        <Charts season={season} visible={contentVisible} />
        <StatCallouts season={season} visible={contentVisible} />
        <Story season={season} question={question} visible={contentVisible} />
        <JsonViewer season={season} question={question} visible={contentVisible} />
      </div>

      {/* Tweaks panel */}
      {tweakPanelVisible && (
        <div style={tp.panel}>
          <div style={tp.hdr}>
            <span style={tp.title}>Tweaks</span>
            <button style={tp.close} onClick={() => { setTweakPanelVisible(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }}>✕</button>
          </div>
          <div style={tp.section}>
            <div style={tp.label}>Active season</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {[2021,2022,2023,2024,2025].map(yr => (
                <button key={yr} onClick={() => handleSeasonChange(yr)} style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 14, padding: '4px 10px', borderRadius: 2, cursor: 'pointer', background: season === yr ? '#e8002d' : '#1a1a1a', color: season === yr ? '#fff' : '#555', border: '1px solid #222' }}>{yr}</button>
              ))}
            </div>
          </div>
          <div style={tp.section}>
            <div style={tp.label}>Quick question</div>
            {PRESET_QUESTIONS_GENERIC.slice(0,3).map((q,i) => (
              <button key={i} onClick={() => setQuestion(q)} style={{ display: 'block', width: '100%', textAlign: 'left', fontFamily: "'Barlow', sans-serif", fontSize: 11, color: question === q ? '#fff' : '#555', background: question === q ? '#1a1a1a' : 'transparent', border: 'none', padding: '5px 0', cursor: 'pointer', lineHeight: 1.4, marginBottom: 2 }}>{q}</button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const tp = {
  panel: { position: 'fixed', bottom: 24, right: 24, width: 240, background: '#111', border: '1px solid #222', borderRadius: 2, zIndex: 300, overflow: 'hidden', boxShadow: '0 8px 40px rgba(0,0,0,0.7)' },
  hdr: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', borderBottom: '1px solid #1c1c1c' },
  title: { fontFamily: "'Barlow', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#888' },
  close: { background: 'none', border: 'none', color: '#444', cursor: 'pointer', fontSize: 12, padding: 2 },
  section: { padding: '12px 14px', borderBottom: '1px solid #141414' },
  label: { fontFamily: "'Barlow', sans-serif", fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#444', marginBottom: 8 },
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
